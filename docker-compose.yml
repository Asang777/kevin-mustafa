services:
  web:
    container_name: kevin-mustafa-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
